<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Netflix Customer Churn Prediction</h1>
        <form method="POST" action="/predict">
            <div class="row mb-3">
                <div class="col">
                    <input type="number" name="age" class="form-control" placeholder="Age" required>
                </div>
                <div class="col">
                    <select name="gender" class="form-control" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <select name="subscription_type" class="form-control" required>
                        <option value="">Subscription Type</option>
                        <option>Basic</option>
                        <option>Standard</option>
                        <option>Premium</option>
                    </select>
                </div>
                <div class="col">
                    <input type="number" name="watch_hours" class="form-control" placeholder="Watch Hours" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <input type="number" name="last_login_days" class="form-control" placeholder="Last Login Days" required>
                </div>
                <div class="col">
                    <select name="region" class="form-control" required>
                        <option value="">Region</option>
                        <option>Asia</option>
                        <option>Africa</option>
                        <option>Europe</option>
                        <option>Oceania</option>
                        <option>South America</option>
                        <option>North America</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <select name="device" class="form-control" required>
                        <option value="">Device</option>
                        <option>TV</option>
                        <option>Mobile</option>
                        <option>Laptop</option>
                        <option>Tablet</option>
                    </select>
                </div>
                <div class="col">
                    <select name="monthly_fee" class="form-control" required>
                        <option value="">Monthly Fee</option>
                        <option>8.99</option>
                        <option>13.99</option>
                        <option>17.99</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <select name="payment_method" class="form-control" required>
                        <option>Payment Method</option>
                        <option>Credit Card</option>
                        <option>Debit Card</option>
                        <option>PayPal</option>
                        <option>Crypto</option>
                        <option>Gift Card</option>
                    </select>
                </div>
                <div class="col">
                    <select name="number_of_profiles" class="form-control" required>
                        <option>Number Of Profiles</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <select name="favorite_genre" class="form-control" required>
                        <option>Favorite Genre</option>
                        <option>Action</option>
                        <option>Sci-Fi</option>
                        <option>Drama</option>
                        <option>Horror</option>
                        <option>Romance</option>
                        <option>Comedy</option>
                        <option>Documentary</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Predict Churn</button>
        </form>

        {% if result %}
        <div class="result">
            <p><strong>Prediction:</strong> {{ result }}</p>
            <p><strong>Churn Probability:</strong> {{ probability }}%</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
